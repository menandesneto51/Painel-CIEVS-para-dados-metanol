    let activeTab = 'geral';

    const lastUpdate = () => { const now = new Date(); const h = now.getHours(); const day = new Intl.DateTimeFormat('pt-BR',{day:'2-digit'}).format(now); const m0 = new Intl.DateTimeFormat('pt-BR',{month:'long'}).format(now); const month = m0.charAt(0).toUpperCase()+m0.slice(1); const year = new Intl.DateTimeFormat('pt-BR',{year:'numeric'}).format(now); const date = `${day} de ${month} de ${year}`; if(h < 10){return `${date} às ${new Intl.DateTimeFormat('pt-BR',{hour:'2-digit',minute:'2-digit'}).format(now)}`;} return `${date} às 10h`; };
    const cidadesAfetadas = () => Object.values(todosCasos.reduce((acc,c)=>{ const nome=c.municipioResidencia||c.cidade; acc[nome] ||= {cidade:nome,casos:0,confirmados:0,investigacao:0,descartados:0,obitosMetanol:0,obitosOutrasCausas:0,internacoes:{}}; acc[nome].casos++; if(c.status==='CONFIRMADO') acc[nome].confirmados++; if(c.status==='EM INVESTIGAÇÃO') acc[nome].investigacao++; if(c.status==='DESCARTADO') acc[nome].descartados++; if(c.isObitoMetanol) acc[nome].obitosMetanol++; if(c.isObitoOutrasCausas) acc[nome].obitosOutrasCausas++; const loc=c.municipioInternacao||nome; acc[nome].internacoes[loc]=(acc[nome].internacoes[loc]||0)+1; return acc;},{})).sort((a,b)=>b.casos-a.casos || b.obitosMetanol-a.obitosMetanol || a.cidade.localeCompare(b.cidade));
    const corMapa = c => c.obitosMetanol > 0 ? '#dc2626' : c.investigacao > 0 ? '#eab308' : c.confirmados > 0 ? '#f97316' : '#16a34a';
    const kpis = () => [

    function cardCaso(c){ return `<div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow duration-300 cursor-pointer" onclick="openModal(${c.id})"><div class="flex items-start gap-3"><span class="${c.statusColor} text-white text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap">${c.status==='CONFIRMADO'?'⚠️':c.status==='EM INVESTIGAÇÃO'?'🔍':'✅'} ${esc(c.status)}</span><div class="flex-1"><div class="flex items-center gap-2 mb-1"><span class="text-gray-500 text-lg">📍</span><span class="font-semibold text-gray-800">Residência: ${esc(c.municipioResidencia||c.cidade)}</span></div><p class="text-xs text-gray-500 mb-1">Internação: ${esc(c.municipioInternacao||'Não informado')}</p><p class="text-sm text-gray-500 mb-1">(${esc(c.perfil)})</p><p class="text-xs text-gray-400 mb-1">${esc(c.data)}</p><p class="text-sm text-gray-600 border-l-2 border-gray-300 pl-3">${esc(c.descricao)}</p><div class="mt-2 flex flex-wrap gap-2">${c.isObitoMetanol?'<span class="text-xs font-semibold text-red-700 bg-red-50 border border-red-200 rounded-full px-2 py-0.5">☠️ Óbito confirmado por metanol</span>':''}${c.isObitoOutrasCausas?'<span class="text-xs font-semibold text-gray-700 bg-gray-50 border border-gray-200 rounded-full px-2 py-0.5">⚫ Óbito por outras causas</span>':''}</div><p class="text-xs text-gray-500 mt-2"><b>Evolução:</b> ${esc(c.evolucao)}</p><p class="text-xs text-gray-500 mt-1"><b>Gravidade:</b> ${esc(c.gravidade)}</p><p class="text-xs text-gray-500 mt-1"><b>Necessitou hospitalização:</b> ${simNao(c.necessitouHospitalizacao)}</p><p class="text-xs text-gray-500 mt-1"><b>Permanece hospitalizado:</b> ${simNao(c.permaneceHospitalizado)}</p><p class="text-xs text-gray-500 mt-1"><b>Recebeu antídoto:</b> ${simNao(c.recebeuAntidoto)}</p></div></div></div>`; }

    function renderTabs(){ const tabs=[['geral','Visão Geral','bg-blue-600'],['confirmados','Confirmados','bg-red-600'],['investigacao','Em Investigação','bg-yellow-500'],['descartados','Descartados','bg-green-600'],['mapa','Mapa','bg-purple-600']]; return `<div class="flex flex-wrap gap-2 mb-8 bg-white p-2 rounded-lg shadow-md">${tabs.map(t=>`<button onclick="setTab('${t[0]}')" class="flex-1 min-w-[120px] px-4 py-3 rounded-lg font-semibold text-sm md:text-base transition-all duration-300 ${activeTab===t[0]?t[2]+' text-white shadow-lg transform scale-105':'bg-gray-100 text-gray-600 hover:bg-gray-200'}">${t[1]}</button>`).join('')}</div>`; }
    function legendaMapa(){ return `<div class="mt-6"><div class="flex flex-wrap gap-3 mb-4 text-xs"><span class="inline-flex items-center gap-2"><i class="w-3 h-3 rounded-full inline-block" style="background:#dc2626"></i>Município com óbito por metanol</span><span class="inline-flex items-center gap-2"><i class="w-3 h-3 rounded-full inline-block" style="background:#eab308"></i>Município com caso em investigação</span><span class="inline-flex items-center gap-2"><i class="w-3 h-3 rounded-full inline-block" style="background:#f97316"></i>Município com confirmado sem óbito</span><span class="inline-flex items-center gap-2"><i class="w-3 h-3 rounded-full inline-block" style="background:#16a34a"></i>Apenas descartados</span></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">${cidadesAfetadas().map(c=>`<div class="border border-gray-200 rounded-lg p-3 bg-gray-50"><div class="flex justify-between items-start gap-2"><div><p class="font-bold text-gray-800">${esc(c.cidade)}</p><p class="text-xs text-gray-500">${c.casos} caso${c.casos===1?'':'s'} notificado${c.casos===1?'':'s'}</p></div><span class="text-white text-xs font-bold px-2 py-1 rounded-full" style="background:${corMapa(c)}">${c.casos}</span></div><div class="mt-2 grid grid-cols-4 gap-1 text-center text-[11px]"><span class="bg-red-50 text-red-700 rounded px-1 py-1">Conf. ${c.confirmados}</span><span class="bg-yellow-50 text-yellow-700 rounded px-1 py-1">Inv. ${c.investigacao}</span><span class="bg-green-50 text-green-700 rounded px-1 py-1">Desc. ${c.descartados}</span><span class="bg-gray-100 text-gray-800 rounded px-1 py-1">Ób. ${c.obitosMetanol}</span></div></div>`).join('')}</div></div>`; }

    function render(){ document.getElementById('root').innerHTML = `<div class="min-h-screen bg-gradient-to-br from-gray-50 to-blue-50 font-sans"><div class="bg-white shadow-sm border-b border-gray-200"><div class="container mx-auto px-4 py-4"><div class="flex flex-wrap justify-between items-center gap-4"><img src="https://raw.githubusercontent.com/luishgm/imagens-para-projetos/main/logos/cievs.png" alt="CIEVS MT" class="h-12 md:h-16 object-contain" onerror="this.style.display='none'"/><img src="https://raw.githubusercontent.com/luishgm/imagens-para-projetos/main/logos/rede-cievs.png" alt="Rede CIEVS" class="h-12 md:h-16 object-contain" onerror="this.style.display='none'"/><img src="https://raw.githubusercontent.com/luishgm/imagens-para-projetos/main/logos/logo-governo-mato-grosso.png" alt="Governo MT" class="h-12 md:h-16 object-contain" onerror="this.style.display='none'"/></div><div class="mt-4"><img src="Cabecalho.jpeg" alt="Cabeçalho COE Metanol SES-MT" class="w-full max-h-64 object-cover rounded-lg shadow-md" onerror="this.style.display='none'"/></div></div></div><div class="container mx-auto px-4 py-8"><div class="text-center mb-8"><h1 class="text-3xl md:text-5xl font-bold text-gray-800 mb-2">Painel de Monitoramento</h1><p class="text-lg md:text-xl text-blue-600 font-semibold">Intoxicação por Suspeita de Metanol (SES-MT)</p></div><div class="bg-gradient-to-r from-yellow-50 to-amber-50 border-l-4 border-yellow-500 p-4 rounded-lg mb-8 shadow-md"><div class="flex flex-col md:flex-row items-center justify-center gap-2 text-center"><span class="text-yellow-600 text-lg">📅</span><span class="font-semibold text-yellow-800">Última Atualização:</span><span class="text-yellow-700">${lastUpdate()}</span></div></div><div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-4 md:gap-6 mb-10">${kpis().map(k=>`<div class="bg-white p-4 md:p-6 rounded-lg shadow-md border-t-4 ${k[3]}"><div class="flex items-center justify-between mb-3 md:mb-4"><span class="text-[10px] md:text-xs font-medium text-gray-600 uppercase tracking-wide leading-tight">${k[0]}</span><span class="text-xl md:text-2xl">${k[2]}</span></div><div class="flex flex-col md:flex-row items-baseline gap-1 md:gap-2"><span class="text-3xl md:text-5xl font-bold ${k[4]} leading-none">${k[1]}</span><span class="text-xs md:text-base text-gray-600">${k[1]===1?'caso':'casos'}</span></div></div>`).join('')}</div>${renderTabs()}<div id="content">${renderContent()}</div></div></div><div id="modal"></div>`; if(activeTab==='mapa') setTimeout(initMap, 50); }
    function setTab(tab){ activeTab=tab; map=null; render(); }
    function openModal(id){ selectedCase = todosCasos.find(c=>c.id===id); const c=selectedCase; document.getElementById('modal').innerHTML = `<div class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center p-4 z-50" onclick="closeModal()"><div class="bg-white rounded-xl p-6 md:p-8 max-w-2xl w-full shadow-2xl" onclick="event.stopPropagation()"><div class="flex items-center justify-between mb-6"><h3 class="text-2xl font-bold text-gray-800 flex items-center gap-2">Detalhes do Caso ${c.isObitoMetanol?'<span class="text-xs font-semibold text-red-700 bg-red-50 border border-red-200 rounded-full px-2 py-0.5">☠️ Óbito confirmado por metanol</span>':''}${c.isObitoOutrasCausas?'<span class="text-xs font-semibold text-gray-700 bg-gray-50 border border-gray-200 rounded-full px-2 py-0.5">⚫ Óbito por outras causas</span>':''}</h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors text-3xl leading-none">×</button></div><div class="space-y-6"><div class="flex flex-wrap items-center gap-3"><span class="${c.statusColor} text-white text-sm font-bold px-4 py-2 rounded-full shadow-sm">${c.status==='CONFIRMADO'?'⚠️':c.status==='EM INVESTIGAÇÃO'?'🔍':'✅'} ${esc(c.status)}</span><span class="px-3 py-1 rounded-full text-sm font-semibold border ${c.gravidade==='Grave'?'bg-red-50 text-red-700 border-red-100':'bg-gray-50 text-gray-700 border-gray-100'}">Gravidade: ${esc(c.gravidade)}</span></div><div class="bg-gray-50 rounded-lg p-4 border border-gray-100"><div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-4"><div><p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Residência</p><p class="font-semibold text-gray-800 text-lg">${esc(c.municipioResidencia)}</p></div><div><p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Local de Internação</p><p class="font-semibold text-gray-800 text-lg">${esc(c.municipioInternacao||'Não informado')}</p></div><div><p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Data da Notificação</p><p class="font-semibold text-gray-800 text-lg">${esc(c.data)}</p></div><div><p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Perfil do Paciente</p><p class="font-semibold text-gray-800">${esc(c.perfil)}</p></div></div></div><div><p class="text-sm font-medium text-gray-500 mb-2">Situação Clínica / Laboratorial</p><p class="text-gray-700 bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500 text-sm md:text-base leading-relaxed">${esc(c.descricao)}</p></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-4"><div class="bg-gray-50 rounded-lg p-3 border border-gray-100"><p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Evolução</p><p class="text-sm text-gray-700">${esc(c.evolucao)}</p></div><div class="bg-gray-50 rounded-lg p-3 border border-gray-100"><p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Manejo Hospitalar</p><p class="text-xs text-gray-700"><b>Necessitou hospitalização:</b> ${simNao(c.necessitouHospitalizacao)}</p><p class="text-xs text-gray-700 mt-1"><b>Permanece hospitalizado:</b> ${simNao(c.permaneceHospitalizado)}</p><p class="text-xs text-gray-700 mt-1"><b>Recebeu antídoto:</b> ${simNao(c.recebeuAntidoto)}</p></div></div></div><div class="mt-8 flex justify-end"><button onclick="closeModal()" class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-lg transition-colors">Fechar</button></div></div></div>`; }
    function closeModal(){ document.getElementById('modal').innerHTML=''; selectedCase=null; }
    function initMap(){ const el=document.getElementById('map'); if(!el || typeof L==='undefined') return; map = L.map('map').setView([-13.5,-56.0],5.6); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap contributors'}).addTo(map); cidadesAfetadas().forEach((c)=>{ const p=coordsMunicipios[c.cidade]; if(!p) return; const color=corMapa(c); const detalhes=Object.entries(c.internacoes).map(([loc,q])=>`${loc}: ${q} ${q===1?'caso':'casos'}`).join(' | '); const popup = `<strong>${c.cidade}</strong><br>` + `${c.casos} ${c.casos===1?'caso notificado':'casos notificados'}<br>` + `<span style="color:#dc2626">Confirmados: ${c.confirmados}</span><br>` + `<span style="color:#eab308">Em investigação: ${c.investigacao}</span><br>` + `<span style="color:#16a34a">Descartados: ${c.descartados}</span><br>` + `<strong>Óbitos por metanol: ${c.obitosMetanol}</strong><br>` + `<small><em>Internações: ${detalhes}</em></small>`; L.circleMarker(p,{radius:8+c.casos*3,color,weight:3,fillColor:color,fillOpacity:.72}).addTo(map).bindPopup(popup); }); }
    window.setTab=setTab; window.openModal=openModal; window.closeModal=closeModal; render();
  </script>
</body>
</html>
